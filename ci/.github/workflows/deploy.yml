name: Deploy

on:
  push:
    branches: [main, dev]

# `staging` and `production` must be configured as GitHub Environments
# (Settings -> Environments). Add required reviewers on `production`
# to enforce manual approval before a production deploy runs.
#
# `dev` deploys to staging; `main` (fed by dev -> main PRs) deploys to
# production. The two jobs are mutually exclusive by branch, not
# sequential.

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to staging
        run: npm run deploy:staging

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to production
        run: npm run deploy:prod
